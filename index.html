<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>高原出高峰：AI 科研智能体总览</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --page-w:2190;
  --page-h:1250;
  --page-ratio:1.752;
  --page-inverse-ratio:.5707762557;
  --ink:#f7fbff;
  --ink-soft:rgba(247,251,255,.72);
  --ink-mute:rgba(247,251,255,.46);
  --paper:#070b12;
  --panel:rgba(10,17,27,.66);
  --blue:#8dccff;
  --blue-deep:#5caaff;
  --warm:#f1a94e;
  --font-sans:'Inter',system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Noto Sans SC',sans-serif;
  --font-serif:'Songti SC','STSong','Noto Serif SC','Source Han Serif SC','SimSun',serif;
  --font-mono:'JetBrains Mono',ui-monospace,'SF Mono',monospace;
  --ease:cubic-bezier(.2,0,0,1);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--paper);}
body{font-family:var(--font-sans);color:var(--ink);-webkit-font-smoothing:antialiased;}
a{color:inherit;text-decoration:none;}
.overview{
  position:fixed;
  left:0;
  top:0;
  width:100vw;
  height:100dvh;
  min-height:100dvh;
  overflow:hidden;
  background:#070b12;
}
.overview::before{
  content:'';
  position:absolute;
  inset:0;
  background:
    linear-gradient(180deg,rgba(3,6,12,.90),rgba(3,6,12,.30) 45%,rgba(3,6,12,.82)),
    radial-gradient(58% 72% at 50% 46%,rgba(92,170,255,.18),transparent 62%),
    radial-gradient(48% 62% at 18% 48%,rgba(141,204,255,.10),transparent 62%),
    radial-gradient(46% 58% at 82% 52%,rgba(241,169,78,.07),transparent 66%),
    url('assets/index-overview-bg.png') center center / cover no-repeat;
  opacity:.92;
}
.overview::after{
  content:'';
  position:absolute;
  inset:0;
  pointer-events:none;
  background:
    linear-gradient(90deg,rgba(255,255,255,.035) 1px,transparent 1px),
    linear-gradient(180deg,rgba(255,255,255,.028) 1px,transparent 1px);
  background-size:120px 120px;
  mask-image:radial-gradient(circle at center,rgba(0,0,0,.70),transparent 68%);
}
.beam{
  position:absolute;
  width:150%;
  height:280px;
  left:-30%;
  top:3%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.13),rgba(141,204,255,.12),transparent);
  filter:blur(118px);
  transform:rotate(-34deg);
  mix-blend-mode:screen;
}
.shell{
  position:relative;
  z-index:1;
  height:100%;
  display:grid;
  grid-template-rows:auto 1fr auto;
  padding:max(30px,3.4vh) max(88px,5.8vw) max(38px,4vh);
}
.topline{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:24px;
  color:rgba(247,251,255,.48);
  font-family:var(--font-mono);
  font-size:max(12px,1.18vh);
  letter-spacing:.24em;
  text-transform:uppercase;
}
.brand{
  color:rgba(247,251,255,.90);
  font-family:var(--font-sans);
  font-size:max(18px,1.82vh);
  font-weight:500;
  letter-spacing:.08em;
  text-transform:none;
}
.meta::before{content:'//';margin-right:16px;color:rgba(247,251,255,.26);}
.title{
  position:absolute;
  left:50%;
  top:max(24px,2.5vh);
  transform:translateX(-50%);
  min-width:420px;
  padding:0 max(40px,3vw) max(14px,1.4vh);
  text-align:center;
  font-family:var(--font-serif);
  font-size:max(34px,3.7vh);
  font-weight:400;
  letter-spacing:.08em;
  color:rgba(247,251,255,.96);
  text-shadow:0 0 28px rgba(141,204,255,.18);
}
.title::before,.title::after{
  content:'';
  position:absolute;
  bottom:0;
  width:45%;
  height:1px;
  background:linear-gradient(90deg,transparent,rgba(141,204,255,.75));
}
.title::before{right:50%;margin-right:16px;}
.title::after{left:50%;margin-left:16px;transform:scaleX(-1);}
.stage{
  position:relative;
  min-height:0;
  display:grid;
  grid-template-columns:minmax(410px,.86fr) minmax(560px,1.18fr) minmax(410px,.86fr);
  align-items:center;
  gap:max(38px,3vw);
}
.nav-column{
  display:grid;
  gap:max(28px,3vh);
}
.nav-column.left{padding-top:max(24px,2.4vh);}
.nav-column.right{padding-bottom:max(22px,2.2vh);}
.nav-card{
  --card-bg:url('assets/g3-chipdesign-cover-bg.png');
  position:relative;
  min-height:max(104px,10.2vh);
  display:grid;
  grid-template-columns:max(70px,5vw) 1fr auto;
  align-items:center;
  gap:max(18px,1.25vw);
  padding:max(18px,1.8vh) max(22px,1.6vw);
  border:1px solid rgba(141,204,255,.24);
  border-radius:6px;
  background:linear-gradient(90deg,rgba(10,17,27,.88),rgba(13,25,40,.62));
  box-shadow:0 20px 54px rgba(0,0,0,.36),inset 0 1px 0 rgba(255,255,255,.055);
  overflow:hidden;
  clip-path:polygon(6% 0,100% 0,100% 74%,94% 100%,0 100%,0 26%);
  transition:transform .22s var(--ease),border-color .22s var(--ease),background .22s var(--ease),box-shadow .22s var(--ease);
}
.nav-card::before{
  content:'';
  position:absolute;
  inset:0;
  background:
    linear-gradient(90deg,rgba(7,11,18,.96),rgba(7,11,18,.75) 56%,rgba(7,11,18,.28)),
    var(--card-bg) center / cover no-repeat;
  opacity:.42;
  transition:opacity .22s var(--ease),transform .22s var(--ease);
}
.nav-card::after{
  content:'';
  position:absolute;
  left:8%;
  right:10%;
  bottom:0;
  height:2px;
  background:linear-gradient(90deg,transparent,rgba(141,204,255,.78),transparent);
  opacity:.76;
}
.nav-card:hover{
  transform:translateY(-3px);
  border-color:rgba(141,204,255,.54);
  background:linear-gradient(90deg,rgba(13,23,36,.94),rgba(20,40,62,.72));
  box-shadow:0 26px 74px rgba(0,0,0,.44),0 0 42px rgba(92,170,255,.16);
}
.nav-card:hover::before{opacity:.60;transform:scale(1.03);}
.nav-card:active{transform:translateY(-1px);}
.left .nav-card{clip-path:polygon(8% 0,100% 0,100% 74%,94% 100%,0 100%,0 26%);}
.right .nav-card{clip-path:polygon(0 0,92% 0,100% 26%,100% 100%,6% 100%,0 74%);}
.card-icon,.card-copy,.card-arrow{position:relative;z-index:1;}
.card-icon{
  width:max(58px,5.5vh);
  aspect-ratio:1;
  display:grid;
  place-items:center;
  border-right:1px solid rgba(141,204,255,.32);
  color:rgba(247,251,255,.92);
}
.card-icon svg{
  width:58%;
  height:58%;
  fill:none;
  stroke:currentColor;
  stroke-width:1.7;
  stroke-linecap:round;
  stroke-linejoin:round;
  filter:drop-shadow(0 0 10px rgba(141,204,255,.26));
}
.card-copy{min-width:0;}
.card-copy small{
  display:block;
  margin-bottom:max(5px,.5vh);
  color:rgba(141,204,255,.78);
  font-family:var(--font-mono);
  font-size:max(10px,1vh);
  letter-spacing:.18em;
}
.card-copy b{
  display:block;
  color:rgba(247,251,255,.96);
  font-family:var(--font-serif);
  font-size:max(26px,2.58vh);
  font-weight:400;
  letter-spacing:.04em;
  white-space:nowrap;
}
.nav-card.compact .card-copy b{
  font-size:max(22px,2.1vh);
  line-height:1.2;
  white-space:normal;
}
.card-arrow{
  width:max(34px,3.3vh);
  aspect-ratio:1;
  display:grid;
  place-items:center;
  border:1px solid rgba(141,204,255,.20);
  border-radius:50%;
  color:rgba(141,204,255,.86);
  font-family:var(--font-mono);
  font-size:max(20px,2vh);
}
.centerpiece{
  position:relative;
  min-height:max(650px,62vh);
  display:grid;
  place-items:center;
}
.orb{
  position:relative;
  width:min(92%,610px);
  aspect-ratio:1;
  border-radius:50%;
  display:grid;
  place-items:center;
  background:
    radial-gradient(circle at 50% 48%,rgba(141,204,255,.18),transparent 52%),
    conic-gradient(from 12deg,rgba(141,204,255,.08),rgba(141,204,255,.48),rgba(241,169,78,.24),rgba(141,204,255,.42),rgba(141,204,255,.08));
  box-shadow:0 0 80px rgba(92,170,255,.18),inset 0 0 52px rgba(141,204,255,.10);
}
.orb::before{
  content:'';
  position:absolute;
  inset:8%;
  border-radius:50%;
  border:1px solid rgba(141,204,255,.46);
  background:
    linear-gradient(180deg,rgba(5,9,15,.04),rgba(5,9,15,.42)),
    url('assets/index-overview-bg.png') center center / cover no-repeat;
  box-shadow:inset 0 0 70px rgba(5,9,15,.82),0 0 40px rgba(141,204,255,.24);
  filter:saturate(.92) contrast(1.05);
}
.orb::after{
  content:'';
  position:absolute;
  inset:-8%;
  border-radius:50%;
  border:1px dashed rgba(141,204,255,.30);
  mask-image:conic-gradient(from 0deg,#000 0 24deg,transparent 24deg 36deg,#000 36deg 68deg,transparent 68deg 82deg,#000 82deg);
  animation:turn 18s linear infinite;
}
.platform{
  position:absolute;
  left:50%;
  bottom:max(20px,2vh);
  width:min(92%,720px);
  height:max(120px,12vh);
  transform:translateX(-50%);
  border-radius:50%;
  background:radial-gradient(ellipse at center,rgba(141,204,255,.24),rgba(92,170,255,.10) 36%,transparent 68%);
  box-shadow:0 0 72px rgba(92,170,255,.17);
}
.platform::before,.platform::after{
  content:'';
  position:absolute;
  inset:16% 5%;
  border-radius:50%;
  border:1px solid rgba(141,204,255,.22);
}
.platform::after{inset:30% 17%;border-color:rgba(241,169,78,.16);}
.bottomline{
  display:flex;
  align-items:flex-end;
  justify-content:center;
  gap:max(24px,2vw);
  color:rgba(247,251,255,.58);
  font-family:var(--font-serif);
  font-size:max(20px,2.05vh);
  letter-spacing:.08em;
}
.bottomline::before,.bottomline::after{
  content:'';
  width:min(28vw,420px);
  height:1px;
  background:linear-gradient(90deg,transparent,rgba(141,204,255,.44));
}
.bottomline::after{transform:scaleX(-1);}
@keyframes turn{to{transform:rotate(360deg);}}
@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important;}
}
@media (max-width:900px){
  html,body{overflow:auto;height:auto;}
  .overview{position:relative;left:auto;top:auto;width:100%;height:auto;min-height:100dvh;aspect-ratio:auto;transform:none;}
  .shell{min-height:100dvh;padding:24px 18px 30px;gap:24px;}
  .topline{align-items:flex-start;flex-direction:column;}
  .title{position:relative;left:auto;top:auto;transform:none;min-width:0;font-size:32px;padding:0 0 14px;}
  .stage{grid-template-columns:1fr;gap:22px;}
  .centerpiece{order:-1;min-height:430px;}
  .orb{width:min(88vw,430px);}
  .nav-column{gap:14px;}
  .nav-column.left,.nav-column.right{padding:0;}
  .nav-card{min-height:86px;grid-template-columns:58px 1fr 32px;padding:14px 16px;}
  .card-copy b{font-size:24px;}
  .bottomline{font-size:17px;line-height:1.5;text-align:center;}
}
</style>
</head>
